<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Eval Suite · Coding-Agent Scorecard</title>
    <meta name="description" content="A friendly community benchmark that measures how well your AI coding assistant fixes real code — and shows you how to make it better.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <!-- Top navigation -->
    <header class="topnav">
      <div class="wrap">
        <a class="brand" href="#home">
          <span class="mark">ES</span>
          <span class="brand-name">LLM Eval Suite</span>
          <span class="brand-sub">Scorecard</span>
        </a>
        <nav class="nav-links" id="nav-links">
          <a href="#home"        data-route="home">Home</a>
          <a href="#setups"      data-route="setups">Setups</a>
          <a href="#challenges"  data-route="challenges">Challenges</a>
          <a href="#leaderboard" data-route="leaderboard">Leaderboard</a>
        </nav>
      </div>
    </header>

    <!-- Routed content is rendered here by app.js -->
    <main>
      <div class="wrap" id="app"><!-- rendered by app.js --></div>
    </main>

    <footer class="foot">
      <div class="wrap">
        <span>LLM Eval Suite — a community benchmark for AI coding assistants.</span>
        <span class="spacer"></span>
        <a href="https://github.com/Desalzes/llm-eval-suite">GitHub</a>
      </div>
    </footer>

    <!-- Modal (used by the "New setup" flow) -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal" role="dialog" aria-modal="true"><!-- filled by app.js --></div>
    </div>

    <!--
      Data is generated from the on-disk corpus by Python and loaded as window
      globals BEFORE app.js (which only reads them). Regenerate with:
        python generate_atlas_data.py        -> atlas-data.js       (window.ATLAS_DATA)
        python generate_leaderboard_data.py  -> leaderboard-data.js (window.LEADERBOARD_DATA)
        python generate_setups_data.py        -> setups-data.js      (window.SETUPS_DATA)
    -->
    <script src="atlas-data.js"></script>
    <script src="leaderboard-data.js"></script>
    <script src="setups-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
